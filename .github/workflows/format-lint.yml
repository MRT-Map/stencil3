name: Format, Lint
on:
  push:
    branches: ["**", "!v2"]
  pull_request:
  workflow_dispatch:

jobs:
  format:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: true
      - uses: ./.github/actions/setup-rust
        with:
          components: rustfmt

      - run: cargo fmt

      - run: echo "message=format @ $(date +%Y%m%dT%H:%M:%S%Z)" >> "$GITHUB_ENV"
        if: github.event_name != 'pull_request'
      - uses: EndBug/add-and-commit@290ea2c423ad77ca9c62ae0f5b224379612c0321 # v10.0.0
        if: github.event_name != 'pull_request'
        with:
          default_author: github_actions
          message: ${{ env.message }}
      - run: git status
        if: github.event_name == 'pull_request'

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      security-events: write
      actions: write
    needs: format

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-rust
        with:
          components: clippy
      - uses: taiki-e/install-action@0c7a94999971db56e9df89df226240aab222e776 # v2.75.14
        env:
          # renovate: datasource=crate depName=clippy-sarif versioning=loose
          CLIPPY_SARIF_VERSION: 0.8.0
        with:
          tool: clippy-sarif@${{ env.CLIPPY_SARIF_VERSION }}

      - uses: zizmorcore/zizmor-action@71321a20a9ded102f6e9ce5718a2fcec2c4f70d8 # v0.5.2

      - run: |
          mkdir sarif-cargo
          cargo clippy --locked --fix --broken-code --allow-dirty \
                       --all-targets --all-features --message-format=json |
          clippy-sarif | tee ${{ runner.temp }}/rust.sarif
        if: '!cancelled()'

      - uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        if: '!cancelled()'
        with:
          sarif_file: ${{ runner.temp }}/rust.sarif
          category: rust

      - run: echo "message=lint @ $(date +%Y%m%dT%H:%M:%S%Z)" >> "$GITHUB_ENV"
        if: github.ref_name == 'dev' && !cancelled()
      - uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        if: github.ref_name == 'dev' && !cancelled()
        with:
          commit-message: ${{ env.message }}
          branch: lint
          title: Linting
      - run: git status
        if: github.ref_name != 'dev' && !cancelled()
