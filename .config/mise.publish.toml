[tools]
"cargo:cargo-bundle" = { version = "=0.11.0", os = ["linux", "macos"] }
"dotnet:wix" = { version = "[7.0.0]", os = ["windows"], postinstall = """
    wix eula accept wix7
    wix extension add -g "WixToolset.Util.wixext/{{ tools.wix.version }}
    wix extension add -g "WixToolset.UI.wixext/{{ tools.wix.version }}
""" }
"cargo:https://github.com/volks73/cargo-wix" = { version = "041cc3c624abca5bcab3c3eaf785ceba9ea59394", locked = true, os = ["windows"] }