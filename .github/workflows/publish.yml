name: Publish
on:
  workflow_dispatch:
  push:
    tags: [ "**" ]

env:
  CARGO_TERM_COLOR: always

  # renovate: datasource=crate depName=cargo-bundle versioning=loose
  CARGO_BUNDLE_VERSION: 0.9.0
  # renovate: cargo-wix
  CARGO_WIX_REV: 041cc3c624abca5bcab3c3eaf785ceba9ea59394
  # renovate: datasource=nuget depname=wix
  WIX_VERSION: 7.0.0

jobs:
  version-changelog:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      changelog: ${{ steps.changelog.outputs.changelog }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - run: cargo update
      - id: version
        run: echo "version=$(cargo pkgid | cut -d '#' -f 2)" >> "$GITHUB_OUTPUT"
      - id: changelog
        run: |
          {
          echo 'changelog<<__EOF__'
          python -c "
          import os
          print('\n'.join(open('CHANGELOG.md').read().split('# v' + os.environ['VERSION'])[1].split('\n')[1:]).split('\n#')[0])
          "
          echo __EOF__
          } >> "$GITHUB_OUTPUT"
        env:
          VERSION: ${{ steps.version.outputs.version }}

  build-macos-aarch64:
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - uses: ./.github/actions/setup-rust
      with:
        cache: false
    - uses: cargo-bins/cargo-binstall@d125de8b4538541574fd9357b6feb61c8486464b # main
    - run: cargo binstall --force cargo-bundle@${{ env.CARGO_BUNDLE_VERSION }}

    - run: cargo --locked bundle --release
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: macos-aarch64
        path: target/release/bundle/osx/stencil3.app

  build-macos-x86_64:
    runs-on: macos-15-intel
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-rust
        with:
          cache: false

      - run: cargo --locked build --release
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: macos-x86_64
          path: target/release/stencil3

  build-macos:
    runs-on: macos-latest
    needs: [build-macos-aarch64, build-macos-x86_64, version-changelog]
    permissions:
      contents: read

    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: macos-aarch64
          path: app/stencil3.app
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: macos-x86_64

      - run: |
          lipo app/stencil3.app/Contents/MacOS/stencil3 stencil3 -create -output stencil3-new
          mv stencil3-new app/stencil3.app/Contents/MacOS/stencil3
      - run: |
          ln -s "/Applications" "app/"
          hdiutil create "stencil3-$VERSION.dmg" -fs HFS+ -volname stencil3 -srcfolder "app/" -ov
        env:
          VERSION: ${{ needs.version-changelog.outputs.version }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: macos
          path: stencil3-*.dmg

  build-linux:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - uses: ./.github/actions/setup-rust
      with:
        cache: false
    - uses: cargo-bins/cargo-binstall@d125de8b4538541574fd9357b6feb61c8486464b # main
    - run: cargo binstall --force cargo-bundle@${{ env.CARGO_BUNDLE_VERSION }}
#    - uses: awalsh128/cache-apt-pkgs-action@acb598e5ddbc6f68a970c5da0688d2f3a9f04d05 # v1.6.0
#      with:
#        packages: libasound2-dev libudev-dev libwayland-dev libxkbcommon-dev
#        version: 1.0

    - run: cargo --locked bundle --release --format deb
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: linux-${{ matrix.os }}
        path: target/release/bundle/deb/stencil3*.deb

  build-windows:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, windows-11-arm]
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - uses: ./.github/actions/setup-rust
      with:
        cache: false
    - run: |
        dotnet tool install --global "wix@${{ env.WIX_VERSION }}"
        wix eula accept wix7
        wix extension add -g "WixToolset.Util.wixext/${{ env.WIX_VERSION }}"
        wix extension add -g "WixToolset.UI.wixext/${{ env.WIX_VERSION }}"
    - run: cargo install --git https://github.com/volks73/cargo-wix --rev ${{ env.CARGO_WIX_REV }} --locked cargo-wix

    - run: cargo --locked build --release
    - run: cargo wix --toolset modern -I "./build/windows/main.wxs" -v --nocapture
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: windows-${{ matrix.os }}
        path: target/wix/stencil3-*.msi

  github-release:
    runs-on: ubuntu-latest
    needs: [ build-linux, build-macos, build-windows, version-changelog ]
    permissions:
      id-token: write
      attestations: write
      contents: write

    steps:
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: macos
        path: dist
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: linux-ubuntu-latest
        path: dist
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: linux-ubuntu-24.04-arm
        path: dist
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: windows-windows-latest
        path: dist
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: windows-windows-11-arm
        path: dist

    - uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
      with:
        subject-path: dist/*
    - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
      with:
        tag_name: v${{ needs.version-changelog.outputs.version }}
        name: v${{ needs.version-changelog.outputs.version }}
        body: ${{ needs.version-changelog.outputs.changelog }}
        files: dist/*
        prerelease: true
        generate_release_notes: true

    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: combined-dist
        path: dist/*

  delete-github-release:
    runs-on: ubuntu-latest
    needs: [ build-macos-aarch64, build-macos-x86_64, build-macos, build-linux, build-windows, github-release, version-changelog ]
    if: ${{ always() && contains(needs.*.result, 'failure') }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - run: gh release delete "$TAG" --cleanup-tag -y
        env:
          TAG: ${{ needs.version-changelog.outputs.version }}
          GH_TOKEN: ${{ github.token }}
        continue-on-error: true

  update-hash:
    runs-on: ubuntu-latest
    needs: [ github-release, version-changelog ]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: master
          persist-credentials: true
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: combined-dist
          path: dist
      - env:
          VERSION: ${{ needs.version-changelog.outputs.version }}
        run: |
          MAC_SHA=$(cat "dist/stencil3-${VERSION}.dmg" | shasum -a 256 | cut -d ' ' -f1)
          cat build/macos/brew.rb | sed "s/sha256 \".*\"/sha256 \"$MAC_SHA\"/" > build/macos/brew2.rb
          cat build/macos/brew2.rb | sed "s/version \".*\"/version \"$VERSION\"/" > build/macos/brew.rb
          rm build/macos/brew2.rb

          LINUX_SHA1=$(cat "dist/stencil3_${VERSION}_amd64.deb" | shasum -a 256 | cut -d ' ' -f1)
          LINUX_SHA2=$(cat "dist/stencil3_${VERSION}_arm64.deb" | shasum -a 256 | cut -d ' ' -f1)
          cat build/linux/PKGBUILD | sed "s/sha256sums_x86_64=.*/sha256sums_x86_64=('$LINUX_SHA1')/" > build/linux/PKGBUILD2
          cat build/linux/PKGBUILD2 | sed "s/sha256sums_aarch64=.*/sha256sums_aarch64=('$LINUX_SHA2')/" > build/linux/PKGBUILD3
          cat build/linux/PKGBUILD3 | sed "s/pkgver=.*/pkgver=${VERSION//-/_}/" > build/linux/PKGBUILD
          rm build/linux/PKGBUILD2 build/linux/PKGBUILD3
          
          cat build/windows/scoop.json | sed "s/\"version\": .*/\"version\": \"$VERSION\",/" > build/windows/scoop2.json
          mv build/windows/scoop2.json build/windows/scoop.json
      - uses: EndBug/add-and-commit@290ea2c423ad77ca9c62ae0f5b224379612c0321 # v10.0.0
        with:
          default_author: github_actions
          message: update sha256 for v${{ needs.version-changelog.outputs.version }}

      - uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        with:
          token: ${{ secrets.PAT }}
          repository: mrt-map/homebrew-mrt-map
          event-type: update_stencil3
      - uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        with:
          token: ${{ secrets.PAT }}
          repository: mrt-map/arch-mrt-map
          event-type: update_stencil3
