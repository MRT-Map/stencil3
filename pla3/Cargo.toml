[package]
name = "pla3"
version = "0.1.0"
edition = "2024"

[dependencies]
eyre = "=0.6.12"
itertools = "=0.14.0"
ordered-float = "=5.3.0"
toml = "=1.1.2"
serde = { version = "=1.0.228", features = ["derive"], optional = true }
tracing = { version = "=0.1.44", optional = true }

duplicate = { version = "=2.0.1", optional = true }
mint = { version = "=0.5.9", optional = true }
geo = { version = "=0.33.1", default-features = false, optional = true }
egui = { version = "=0.34.2", default-features = false, optional = true }
glam = { version = "=0.33.0", default-features = false, optional = true, features = ["all-types"] }

[features]
mint = ["dep:mint", "duplicate"]
geo = ["dep:geo", "duplicate"]
egui = ["dep:egui", "duplicate"]
glam = ["dep:glam", "duplicate"]

[dev-dependencies]
glam = { version = "=0.33.0", features = ["std"] }

[lints]
workspace = true