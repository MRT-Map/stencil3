[tools]
hk = "1.45.0"
pkl = "0.31.1"
rust = { version = "nightly-2026-05-08", components = "rustfmt,clippy" }
cargo-binstall = "1.19.1"
"cargo:clippy-sarif" = "0.8.0"
zizmor = "1.24.1"
actionlint = "1.7.12"
"github:boostsecurityio/poutine" = "1.1.4"

[tasks]
pre-commit = { run = "hk run pre-commit" }

[settings]
minimum_release_age = "3d"
